name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  validate:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Check Swift sources exist
        run: |
          find Mercury -name "*.swift" | wc -l
          test -f Mercury/App/MercuryApp.swift
          test -f Mercury/Grok/GrokClient.swift
          echo "Foundation sources present"
